team_folder_pattern: '^team[0-9]{2}-[a-z0-9][a-z0-9-]*$'
require_single_team_folder_per_pr: true
max_file_size_mb: 50

required_team_files:
  - README.md
  - project.yml

# README 섹션은 required / optional로 나눌 수 있습니다.
# required_readme_sections에 들어간 항목은 누락 시 검증 실패입니다.
# optional_readme_sections에 들어간 항목은 누락 시 warning만 남깁니다.
required_readme_sections:
  - 프로젝트 소개
  - 문제 정의
  - 문제 해결
  - 핵심 기능
  - 팀원 소개

optional_readme_sections:
  - 데모 영상
  - 참고자료 / 발표자료

required_project_yml_fields:
  - schema_version
  - team.number
  - team.folder_name
  - team.members
  - project.title
  - project.summary

forbidden_path_patterns:
  - '(^|/)\.git(/|$)'
  - '(^|/)\.gitmodules$'
  - '(^|/)\.env$'
  - '(^|/)node_modules(/|$)'
  - '(^|/)\.venv(/|$)'
  - '(^|/)dist(/|$)'
  - '(^|/)build(/|$)'
  - '(^|/)__pycache__(/|$)'
